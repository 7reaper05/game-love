<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aranza & Chato: The Great Cat Rescue</title>
    <style>
        body { 
            margin: 0; 
            background: #2b1f15; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Georgia, serif; 
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #gameCanvas { 
            background: #f4ebd8; 
            border: 4px solid #b8860b; 
            display: block;
        }
        /* Scenography overlay for the Storybook HUD */
        .hud { 
            position: absolute;
            top: 20px;
            left: 20px;
            color: #3e2723; 
            font-size: 1.4rem; 
            font-weight: bold; 
            text-shadow: 1px 1px 0px #fff;
            pointer-events: none;
            display: none;
        }
        /* Vintage Parchment Passcode Screen Overlays */
        #gatekeeperOverlay {
            position: absolute;
            top: 0; left: 0; width: 800px; height: 400px;
            background: #2b1f15;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid #b8860b;
            box-sizing: border-box;
            z-index: 10;
        }
        .parchment-scroll {
            background: #f4ebd8;
            border: 2px dashed #8b5a2b;
            padding: 30px;
            border-radius: 4px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(139,90,43,0.2);
            max-width: 400px;
        }
        .parchment-scroll h2 { color: #3e2723; margin-top: 0; font-style: italic; }
        .parchment-scroll p { color: #5d4037; font-size: 0.95rem; line-height: 1.4; }
        .pass-input {
            background: #fffdf9;
            border: 1px solid #8b5a2b;
            padding: 10px;
            font-size: 1.1rem;
            font-family: Georgia, serif;
            text-align: center;
            color: #3e2723;
            width: 80%;
            margin-bottom: 15px;
            outline: none;
        }
        .parchment-btn {
            background: #8b5a2b;
            color: #f4ebd8;
            border: none;
            padding: 10px 25px;
            font-family: Georgia, serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .parchment-btn:hover { background: #3e2723; }
        #errorMsg { color: #b22222; font-size: 0.85rem; margin-top: 8px; font-weight: bold; min-height: 18px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="gatekeeperOverlay">
        <div class="parchment-scroll">
            <h2>The Sanctuary Vault</h2>
            <p>To guide Aranza through the magical realms and reunite her with Chato, speak the secret word that unlocks the seal:</p>
            <input type="password" id="passcodeField" class="pass-input" placeholder="Enter secret code..." autocomplete="off">
            <br>
            <button class="parchment-btn" onclick="verifyGatekeeper()">Unlock Journey</button>
            <div id="errorMsg"></div>
        </div>
    </div>

    <div class="hud" id="gameHud">Stage 1: Rescuing Ameli</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    // --- 0. PASSCODE GATEKEEPER ---
    // You can customize the secret pass string inside this variable!
    const SECRET_GATEWAY_CODE = "chato"; 

    function verifyGatekeeper() {
        const inputField = document.getElementById("passcodeField");
        const errorDisplay = document.getElementById("errorMsg");
        
        if (inputField.value.trim().toLowerCase() === SECRET_GATEWAY_CODE) {
            document.getElementById("gatekeeperOverlay").style.display = "none";
            document.getElementById("gameHud").style.display = "block";
            isGameRunning = true;
            loop(); // Kick off the main game core process loop
        } else {
            errorDisplay.innerText = "The magical seal remains shut. Try again.";
            inputField.value = "";
            inputField.focus();
        }
    }

    // Allow pressing "Enter" key on the password input field
    document.getElementById("passcodeField").addEventListener("keyup", e => {
        if (e.key === "Enter") verifyGatekeeper();
    });

    // --- 1. ENGINE CONFIG & ASSET HOOKS ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let isGameRunning = false;

    const assets = {
        bg: { img: new Image(), src: 'assets/parchment_bg.png' },
        fairy_fly: { img: new Image(), frames: 12, src: 'assets/aranza_fly.png' },
        fairy_pickup: { img: new Image(), frames: 8, src: 'assets/aranza_pickup.png' },
        chato: { img: new Image(), frames: 10, src: 'assets/chato_wave.png' },
        crystal: { img: new Image(), frames: 4, src: 'assets/purple_crystal.png' },
        
        // Scenography Assets (Storybook environment overrides)
        decor_tree: { img: new Image(), src: 'assets/scenery_tree.png' },
        decor_island: { img: new Image(), src: 'assets/scenery_island.png' },
        decor_pillar: { img: new Image(), src: 'assets/scenery_pillar.png' }
    };
    
    const catLibrary = ["Ameli", "Shadow", "Silvie", "Gray", "La niña", "Neo"];
    catLibrary.forEach((name, i) => {
        let safeName = name.toLowerCase().replace(" ", "");
        assets['c' + i + '_s'] = { img: new Image(), frames: 6, src: `assets/${safeName}_sleep.png` };
        assets['c' + i + '_w'] = { img: new Image(), frames: 8, src: `assets/${safeName}_stand.png` };
    });
    Object.values(assets).forEach(a => { if(a.src) a.img.src = a.src; });

    // --- 2. EXPANDED SCENOGRAPHY MATRIX ---
    const levelSettings = [
        { mapWidth: 2000, crystalSpeed: 0, spawnRate: 0.01, title: "Stage 1: Rescuing Ameli (The Whispering Woods)", decorType: "tree", colorTint: "rgba(34,139,34,0.06)" },
        { mapWidth: 2500, crystalSpeed: 1, spawnRate: 0.015, title: "Stage 2: Rescuing Shadow (The Quiet Glade)", decorType: "tree", colorTint: "rgba(112,128,144,0.08)" },
        { mapWidth: 3000, crystalSpeed: 2, spawnRate: 0.02, title: "Stage 3: Rescuing Silvie (The Floating Isles)", decorType: "island", colorTint: "rgba(70,130,180,0.06)" },
        { mapWidth: 3500, crystalSpeed: 3, spawnRate: 0.025, title: "Stage 4: Rescuing Gray (The Windy Peaks)", decorType: "island", colorTint: "rgba(245,245,220,0.05)" },
        { mapWidth: 4000, crystalSpeed: 4, spawnRate: 0.03, title: "Stage 5: Rescuing La niña (The Celestial Ruins)", decorType: "pillar", colorTint: "rgba(147,112,219,0.07)" },
        { mapWidth: 4500, crystalSpeed: 5, spawnRate: 0.04, title: "Stage 6: Rescuing Neo (The Magical Vortex)", decorType: "pillar", colorTint: "rgba(218,112,214,0.1)" }
    ];

    // --- 3. STATE ---
    let time = 0;
    let isPickingUp = false;
    let currentLevel = 0; 
    let cameraX = 0;
    let crystals = [];
    
    const fairy = { x: 100, y: 200, vx: 0, vy: 0, w: 80, h: 90 };
    const input = { left: false, right: false, up: false, down: false };

    window.addEventListener("keydown", e => { 
        if(e.key === "ArrowLeft" || e.key === "a") input.left = true;
        if(e.key === "ArrowRight" || e.key === "d") input.right = true;
        if(e.key === "ArrowUp" || e.key === "w") input.up = true;
        if(e.key === "ArrowDown" || e.key === "s") input.down = true;
    });
    window.addEventListener("keyup", e => { 
        if(e.key === "ArrowLeft" || e.key === "a") input.left = false;
        if(e.key === "ArrowRight" || e.key === "d") input.right = false;
        if(e.key === "ArrowUp" || e.key === "w") input.up = false;
        if(e.key === "ArrowDown" || e.key === "s") input.down = false;
    });

    function resetLevel() {
        fairy.x = 100; fairy.y = 200;
        fairy.vx = 0;   fairy.vy = 0;
        crystals = [];
        isPickingUp = false;
    }

    // --- 4. RENDER CONTEXT CONTROLLER ---
    function drawSprite(asset, x, y, w, h, fallbackColor = "rgba(139,69,19,0.15)") {
        if(!asset.img.complete || asset.img.naturalWidth === 0) {
            ctx.fillStyle = fallbackColor;
            ctx.fillRect(x, y, w, h);
            return;
        }
        let frame = Math.floor(time / 12) % asset.frames;
        let frameW = asset.img.width / asset.frames;
        ctx.drawImage(asset.img, frame * frameW, 0, frameW, asset.img.height, x, y, w, h);
    }

    function drawStaticScenography(asset, x, y, w, h, borderStyle) {
        if(asset.img.complete && asset.img.naturalWidth > 0) {
            ctx.drawImage(asset.img, x, y, w, h);
        } else {
            // Creative visual sketch backup outlines to build the hand-drawn vibe immediately
            ctx.strokeStyle = "#8b5a2b";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = "rgba(139,69,19,0.03)";
            ctx.fillRect(x, y, w, h);
            ctx.setLineDash([]);
            ctx.fillStyle = "#5d4037";
            ctx.font = "italic 12px Georgia";
            ctx.fillText(`[${borderStyle}]`, x + 10, y + 30);
        }
    }

    // --- 5. EXECUTION CORE LOOP ---
    function loop() {
        if (!isGameRunning) return;
        time++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let currentSetting = levelSettings[currentLevel] || { mapWidth: 800, title: "The Sanctuary", colorTint: "rgba(212,175,55,0.05)" };
        document.getElementById("gameHud").innerText = currentSetting.title;

        // Dynamic Viewport tracking
        if (currentLevel < 6) {
            let targetCamX = fairy.x - 200;
            cameraX += (targetCamX - cameraX) * 0.1;
            cameraX = Math.max(0, Math.min(currentSetting.mapWidth - canvas.width, cameraX));
        } else {
            cameraX = 0; 
        }

        // Base Tiled Parchment Sheet
        if (assets.bg.img.complete) {
            let bgOffset = -(cameraX % canvas.width);
            ctx.drawImage(assets.bg.img, bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(assets.bg.img, bgOffset + canvas.width, 0, canvas.width, canvas.height);
        }

        // Apply Atmospheric Tint per realm aesthetic
        ctx.fillStyle = currentSetting.colorTint;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Save translation matrices for relative camera tracking
        ctx.save();
        ctx.translate(-cameraX, 0);

        // --- DRAW LEVEL SCENOGRAPHY (FOREGROUND / ENVIRONMENT BACKGROUND) ---
        if (currentLevel < 6) {
            let spacing = 450; 
            let totalDecorations = Math.ceil(currentSetting.mapWidth / spacing);
            
            for (let i = 0; i < totalDecorations; i++) {
                let decorX = i * spacing + 200;
                if (currentSetting.decorType === "tree") {
                    drawStaticScenography(assets.decor_tree, decorX, 180, 120, 220, "Sketchy Tree");
                } else if (currentSetting.decorType === "island") {
                    drawStaticScenography(assets.decor_island, decorX, 80, 160, 90, "Floating Island");
                } else if (currentSetting.decorType === "pillar") {
                    drawStaticScenography(assets.decor_pillar, decorX, 0, 90, 400, "Ancient Column Ruins");
                }
            }
        }

        // Gliding Flight Vector processing
        if (!isPickingUp) {
            let targetVx = (input.right ? 6 : 0) - (input.left ? 6 : 0);
            let targetVy = (input.down ? 6 : 0) - (input.up ? 6 : 0);
            fairy.vx += (targetVx - fairy.vx) * 0.1;
            fairy.vy += (targetVy - fairy.vy) * 0.1;
            fairy.x += fairy.vx;
            fairy.y += fairy.vy;

            let maxX = currentLevel < 6 ? currentSetting.mapWidth - fairy.w : canvas.width - fairy.w;
            fairy.x = Math.max(0, Math.min(maxX, fairy.x));
            fairy.y = Math.max(0, Math.min(canvas.height - fairy.h, fairy.y));
        }

        // Stage State Handler
        if (currentLevel < 6) {
            // Hazard spawning pipeline
            if (Math.random() < currentSetting.spawnRate) {
                crystals.push({
                    x: cameraX + canvas.width + 50,
                    y: Math.random() * (canvas.height - 80),
                    vy: (Math.random() - 0.5) * currentSetting.crystalSpeed,
                    w: 40, h: 50
                });
            }

            for (let i = crystals.length - 1; i >= 0; i--) {
                let crys = crystals[i];
                crys.x -= (3 + currentSetting.crystalSpeed); 
                crys.y += crys.vy;

                if (crys.y < 0 || crys.y > canvas.height - crys.h) crys.vy *= -1;

                drawSprite(assets.crystal, crys.x, crys.y, crys.w, crys.h, "rgba(147,112,219,0.8)");

                // Collision detection bounds check
                if (fairy.x < crys.x + crys.w && fairy.x + fairy.w > crys.x &&
                    fairy.y < crys.y + crys.h && fairy.y + fairy.h > crys.y) {
                    resetLevel(); 
                }
                if (crys.x < cameraX - 100) crystals.splice(i, 1);
            }

            // Target Objective configuration
            let catX = currentSetting.mapWidth - 150;
            let catY = 240;
            let distToCat = Math.hypot(fairy.x - catX, fairy.y - catY);
            
            if (distToCat < 50 && !isPickingUp) {
                isPickingUp = true;
                setTimeout(() => { 
                    currentLevel++; 
                    resetLevel(); 
                }, 2000); 
            }

            let catAnim = distToCat < 250 ? assets['c'+currentLevel+'_w'] : assets['c'+currentLevel+'_s'];
            drawSprite(catAnim, catX, catY, 65, 65);
            
        } else {
            // Sanctuary (Trophy Room Layout)
            drawStaticScenography(assets.decor_pillar, 40, 0, 80, 400, "Sanctuary Pillar");
            drawStaticScenography(assets.decor_pillar, 680, 0, 80, 400, "Sanctuary Pillar");
            
            drawSprite(assets.chato, 600, 180, 100, 130);
            
            catLibrary.forEach((_, i) => {
                drawSprite(assets['c' + i + '_w'], 70 + (i * 85), 280, 60, 60);
            });
        }

        // Active Player Draw Matrix
        let activeAranzaAnim = isPickingUp ? assets.fairy_pickup : assets.fairy_fly;
        drawSprite(activeAranzaAnim, fairy.x, fairy.y, fairy.w, fairy.h);

        ctx.restore(); 
        requestAnimationFrame(loop);
    }
</script>

</body>
</html>
