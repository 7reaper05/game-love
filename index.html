<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aranza & Chato: The Complete Journey</title>
    <style>
        body { 
            margin: 0; 
            background: #2b1f15; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Georgia, serif; 
        }
        #gameCanvas { 
            background: #f4ebd8; 
            border: 4px solid #b8860b; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 1. ASSET CONFIGURATION ---
    // The "frames" numbers here match the high-quality sprite sheets we discussed.
    const assets = {
        bg: { img: new Image(), src: 'assets/parchment_bg.png' },
        fairy_fly: { img: new Image(), frames: 12, src: 'assets/aranza_fly.png' },
        fairy_pickup: { img: new Image(), frames: 8, src: 'assets/aranza_pickup.png' },
        chato: { img: new Image(), frames: 10, src: 'assets/chato_wave.png' }
    };
    
    // Dynamically load the 6 cats and set their frame counts
    const catLibrary = ["ameli", "shadow", "silvie", "gray", "lanina", "neo"];
    catLibrary.forEach((name, i) => {
        // Sleep animation (6 frames), Stand/Wag animation (8 frames)
        assets['c' + i + '_s'] = { img: new Image(), frames: 6, src: `assets/${name}_sleep.png` };
        assets['c' + i + '_w'] = { img: new Image(), frames: 8, src: `assets/${name}_stand.png` };
    });
    
    // Tell the browser to load all the image paths we just set up
    Object.values(assets).forEach(a => { if(a.src) a.img.src = a.src; });

    // --- 2. GAME STATE ---
    let time = 0;
    let isPickingUp = false;
    let currentLevel = 0; // 0-5 are the cats, 6 is the Sanctuary
    
    // Aranza's physics variables
    const fairy = { x: 80, y: 150, vx: 0, vy: 0 };
    
    // Input tracking
    const input = { left: false, right: false, up: false, down: false };

    window.addEventListener("keydown", e => { 
        if(e.key === "ArrowLeft" || e.key === "a") input.left = true;
        if(e.key === "ArrowRight" || e.key === "d") input.right = true;
        if(e.key === "ArrowUp" || e.key === "w") input.up = true;
        if(e.key === "ArrowDown" || e.key === "s") input.down = true;
    });
    window.addEventListener("keyup", e => { 
        if(e.key === "ArrowLeft" || e.key === "a") input.left = false;
        if(e.key === "ArrowRight" || e.key === "d") input.right = false;
        if(e.key === "ArrowUp" || e.key === "w") input.up = false;
        if(e.key === "ArrowDown" || e.key === "s") input.down = false;
    });

    // --- 3. RENDERING ENGINE ---
    function drawSprite(asset, x, y, w, h) {
        if(!asset.img.complete || asset.img.naturalWidth === 0) return;
        
        // Division by 12 controls the animation speed. Higher = slower/smoother.
        let frame = Math.floor(time / 12) % asset.frames;
        let frameW = asset.img.width / asset.frames;
        
        ctx.drawImage(asset.img, frame * frameW, 0, frameW, asset.img.height, x, y, w, h);
    }

    // --- 4. MAIN GAME LOOP ---
    function loop() {
        time++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw the moving parchment background
        if (assets.bg.img.complete) {
            ctx.drawImage(assets.bg.img, 0, 0, canvas.width, canvas.height);
        }

        // --- PHYSICS: GLIDING MOVEMENT ---
        if (!isPickingUp && currentLevel < 6) {
            let targetVx = (input.right ? 5 : 0) - (input.left ? 5 : 0);
            let targetVy = (input.down ? 5 : 0) - (input.up ? 5 : 0);
            
            // The "0.1" here is the gliding weight. It makes her float smoothly.
            fairy.vx += (targetVx - fairy.vx) * 0.1;
            fairy.vy += (targetVy - fairy.vy) * 0.1;
            fairy.x += fairy.vx;
            fairy.y += fairy.vy;

            // Keep Aranza inside the screen bounds
            fairy.x = Math.max(0, Math.min(canvas.width - 70, fairy.x));
            fairy.y = Math.max(0, Math.min(canvas.height - 80, fairy.y));
        }

        // --- LEVEL LOGIC ---
        if (currentLevel < 6) {
            let catX = 650;
            let catY = 220;
            let distToCat = Math.hypot(fairy.x - catX, fairy.y - catY);
            
            // 1. Pickup Sequence
            if (distToCat < 45 && !isPickingUp) {
                isPickingUp = true;
                // Pause for 2 seconds to play the "Pickup" animation, then advance level
                setTimeout(() => { 
                    isPickingUp = false; 
                    currentLevel++; 
                    fairy.x = 80; // Reset Aranza to the left side
                    fairy.y = 150;
                    fairy.vx = 0;
                    fairy.vy = 0;
                }, 2000); 
            }

            // 2. Proximity Engine: Draw Sleep vs Stand
            let catState = distToCat < 200 ? assets['c'+currentLevel+'_w'] : assets['c'+currentLevel+'_s'];
            drawSprite(catState, catX, catY, 70, 70);
            
        } else {
            // --- THE SANCTUARY (FINAL ROOM) ---
            // Draw Chato waving
            drawSprite(assets.chato, 620, 180, 100, 130);
            
            // Draw all 6 collected cats lined up
            catLibrary.forEach((_, i) => {
                drawSprite(assets['c' + i + '_w'], 50 + (i * 90), 280, 60, 60);
            });

            // Keep Aranza gliding in the Sanctuary so you can fly around
            let targetVx = (input.right ? 5 : 0) - (input.left ? 5 : 0);
            let targetVy = (input.down ? 5 : 0) - (input.up ? 5 : 0);
            fairy.vx += (targetVx - fairy.vx) * 0.1;
            fairy.vy += (targetVy - fairy.vy) * 0.1;
            fairy.x += fairy.vx;
            fairy.y += fairy.vy;
            fairy.x = Math.max(0, Math.min(canvas.width - 70, fairy.x));
            fairy.y = Math.max(0, Math.min(canvas.height - 80, fairy.y));
        }

        // --- DRAW ARANZA ---
        let activeAranzaAnim = isPickingUp ? assets.fairy_pickup : assets.fairy_fly;
        drawSprite(activeAranzaAnim, fairy.x, fairy.y, 80, 90);

        requestAnimationFrame(loop);
    }

    // Start the game
    loop();
</script>

</body>
</html>
